<!DOCTYPE html>
<html>
    <head>
        <title>To Do List</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            To Do List
        </header>
        <section class="container">


        <!--===================LEFT -SIDEBAR=======================-->

        <section class="sidebar">
            <!--left panel-->
            <h3>Menu</h3>
            <input type="text" placeholder="Search">
            <h4>Tasks</h4>
            <ul>
                <li>Upcoming</li>
                <li>Today</li>
                <li>Calendar</li>
                <li>Sticky Wall</li>
            </ul>
            <h4>Lists</h4>
                <li>Personal</li>
                <li>Work</li>
                <li>Study</li>
            <h4>Tags</h4>
                <li>Shopping</li>
                <li>Cab</li>

        </section> 



        <!--===================MAIN-CONTENT=======================-->

        <section class="main-content">
            <!--center panel-->
            <div class="Today">
                <h3>Today</h3>
            </div>
            
        </section>





        <!--==================Task:=======================-->

        <section class="task">
            <!--right panel-->
            <h2>task-title</h3>
            <h4>task:</h4>
            <input type="text" placeholder="Task - Title">
            <textarea placeholder="Description"></textarea>
            <label>Due Date</label>
            <input type="date">
            <label>Tags</label>
            <input type=" text" placeholder="ex. cab expense">
            <button>Delete Task</button>
            <button>Save Changes</button>

        </section>
        </main>

    </body>
</html>
