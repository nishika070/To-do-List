<!DOCTYPE html>
<html>
    <head>
        <title>TO DO LIST</title>
        <link rel="stylesheet" href="style.css">

    </head>
    <body>
        <header class="title">
            <div class="with-logo">
            <img src="/logo.png" alt="logo not found"/>
            <div class="inner">
            <h1>TO DO LIST</h1>
            <p>Smarter way to success</p>
            </div>
            </div>
        </header>
        <main class="container">

            <!--=============side panel ====================-->


            <section class="side-panel">
                <h2>Menu</h2>
                <input type="text" placeholder="Search">
                <p class="label">Tasks</p>
                <ul>
                    
                    <li>Upcoming</li>
                    <li>Today</li>
                    <li>Calendar</li>
                    <li>Sticky Wall</li>
                </ul>
                <p class="label">Lists</p>
                <ul>
                    
                    <li>Personal</li>
                    <li>Work</li>
                    <li>Study</li>
                </ul>
                <p class="label">Tags</p>
                <ul>
                    
                    <li>Tag1</li>
                    <li>Tag2</li>
                    
                </ul>
                <div class="side-panel-buttons">
                <button class="setting">Settings</button>
                <button class="sign-out">Sign out </button>
                </div>

            </section>

            <!--=============main-center ====================-->

            
            <section class="main">
                <h2>Today</h2>
                <button>+Add New Task</button>
                <!--have to figure out how to store the data and show on frontend-->

            </section>
            

            <!--=============right task details ====================-->

            
            <section class="task-details">
                <h2>Task:</h2>
                
                <div class="form-row">
                    <input type="text" id="task-name" placeholder="Renew driver's license">
                </div>
                
                <div class="form-row">
                    <textarea id="task-desc" placeholder="Description....."></textarea>
                </div>
                
                <div class="form-row-inline">
                    <label>Due Date</label>
                    <input type="date" id="task-date">
                </div>
                
                <div class="form-row-inline">
                    <label>Tags</label>
                    <input type="text" placeholder="Tag1" id="task-tag">
                </div>
                
                <h3 class="sub">Subtasks:</h3>
                <div class="form-row subtask-row">
                    <input type="text" placeholder="Add New Subtask" id="task-subtask">
                    <!---<input type="checkbox">-->
                </div>
                <div class="action-buttons">
                    <button class="save" id="savebtn">Save Changes</button>
                    <button class="delete" id="deletebtn">Delete task</button>
                </div>
                </section>
        </main>
        <script src="app.js"></script>
    </body>
</html>
