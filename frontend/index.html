<!DOCTYPE html>
<html>
    <head>
        <title>To Do List</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            To Do List
        </header>
        <section class="container">
        <!--===================LEFT -SIDEBAR=======================-->

        <section class="sidebar">
            <!--left panel-->
            <div class="Menu">
                <h3>Menu</h3>
            </div>
            <div class="search-bar">--search-bar to be</div>
            <div class="Tasks">
                <p>Tasks</p>
            </div>
            <div class="Lists">
                <p>Lists</p>
            </div>
            <div class="Tags">
                <p>Tags</p>
            </div>
            <div class="settings">
                <p>settings</p>
            </div>
            <div class="Sign out">
                <p>Sign out</p>
            </div>
        </section> 



        <!--===================MAIN-CONTENT=======================-->

        <section class="main-content">
            <!--center panel-->
            <div class="Today">
                <h3>Today</h3>
            </div>
            
        </section>





        <!--==================Task:=======================-->

        <section class="task">
            <!--right panel-->
            <div class="task-title">
                <h3>Task</h3>
            </div>
            <div class-task-details >
                <div class="row">
                    <span>List</span>


                </div>
                <div class="row">
                    <span>Due date</span>


                </div>
                <div class="row">
                    <span>Tags</span>


                </div>
                <div class="row">
                    <span>Subtasks:</span>
                </div>

            </div>
        </section>
        </main>

    </body>
</html>
